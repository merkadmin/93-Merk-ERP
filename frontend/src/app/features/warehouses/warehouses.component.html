<app-regular-list-header-with-actions [title]="'warehouses.title' | translate" icon="ki-outline ki-home-2"
  color="primary" [selectedCount]="selectedIds().size" [showImportExport]="true" (add)="addNew()" (refresh)="load()"
  (deleteSelected)="deleteSelected()" (exportTemplate)="exportTemplate()" (importFile)="importExcel($event)" />

<app-regular-list-search-actions [fields]="searchFields" (filterChange)="onFilterChange($event)" />

<app-custom-table-with-pagination entity="warehouses" [rows]="displayRows" [cellRenderers]="cellRenderers"
  (metadataLoaded)="columnMeta.set($event)" (selectionChange)="selectedIds.set($event)">
  <ng-template #treeCell let-w>
    <div class="d-flex align-items-center" [style.paddingInlineStart.px]="w.level * 24">
      @if (w.level > 0) {
      <span class="text-muted fs-9 me-1" style="line-height:1">└─</span>
      }
      @if (!w.parentWarehouseId) {
      <i class="ki-outline ki-home-2 fs-4 text-primary me-2"></i>
      } @else if (w.isParent) {
      <i class="ki-outline ki-abstract-28 fs-4 text-warning me-2"></i>
      } @else {
      <i class="ki-outline ki-home-1 fs-4 text-gray-400 me-2"></i>
      }
      {{ w.name_EN }}
    </div>
  </ng-template>
  <ng-template #rowActions let-w>
    <div class="d-inline-flex align-items-center gap-2">
      <button class="btn btn-icon btn-sm btn-light-primary" (click)="edit(w.id)" [title]="'common.edit' | translate">
        <i class="ki-outline ki-pencil fs-4"></i>
      </button>
      @if (w.isActive) {
      <button class="btn btn-sm btn-light-warning" (click)="toggleActive(w)">
        <i class="ki-outline ki-minus-circle fs-4 me-1"></i>
        {{ 'common.deactivate' | translate }}
      </button>
      } @else {
      <button class="btn btn-sm btn-light-success" (click)="toggleActive(w)">
        <i class="ki-outline ki-check-circle fs-4 me-1"></i>
        {{ 'common.activate' | translate }}
      </button>
      }
      <button class="btn btn-icon btn-sm btn-light-danger" (click)="delete(w.id)" [title]="'common.delete' | translate">
        <i class="ki-outline ki-trash fs-4"></i>
      </button>
    </div>
  </ng-template>
</app-custom-table-with-pagination>
