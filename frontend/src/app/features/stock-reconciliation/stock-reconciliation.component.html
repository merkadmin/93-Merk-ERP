<app-regular-list-header-with-actions
  [title]="'stock_reconciliation.title' | translate"
  icon="ki-outline ki-document"
  color="primary"
  [selectedCount]="selectedIds().size"
  [showImportExport]="true"
  (add)="addNew()"
  (refresh)="load()"
  (deleteSelected)="deleteSelected()"
  (exportTemplate)="exportTemplate()"
  (importFile)="importExcel($event)" />

<app-regular-list-search-actions [fields]="searchFields" (filterChange)="onFilterChange($event)" />

<app-custom-table-with-pagination
  entity="stockreconciliationtransactions"
  [rows]="filteredRecords"
  [cellRenderers]="cellRenderers"
  (metadataLoaded)="columnMeta.set($event)"
  (selectionChange)="selectedIds.set($event)"
  [reload]="metaReloadKey()">
  <ng-template #rowActions let-item>
    <div class="d-inline-flex align-items-center gap-2">
      <button class="btn btn-icon btn-sm btn-light-primary" (click)="edit(item)"
        [title]="'common.edit' | translate">
        <i class="ki-outline ki-pencil fs-4"></i>
      </button>
      @if (item.stockTransactionStatusId === 3) {
      <div class="btn-group btn-group-sm">
        <button class="btn btn-success btn-sm dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="ki-outline ki-setting-2 fs-4 me-1"></i>
          {{ 'common.actions' | translate }}
        </button>
        <ul class="dropdown-menu dropdown-menu-end"
            [dir]="isRtl ? 'rtl' : 'ltr'"
            [style.text-align]="isRtl ? 'right' : 'left'">
          <li>
            <a class="dropdown-item" href="#" (click)="$event.preventDefault(); reissueTxn(item)">
              <i class="ki-outline ki-arrows-circle fs-4 me-2"></i>
              {{ 'common.reissue' | translate }}
            </a>
          </li>
          <li>
            <a class="dropdown-item text-danger" href="#" (click)="$event.preventDefault(); cancelTxn(item)">
              <i class="ki-outline ki-cross-circle fs-4 me-2"></i>
              {{ 'common.cancel' | translate }}
            </a>
          </li>
        </ul>
      </div>
      } @else {
      <button class="btn btn-sm btn-success" (click)="submitTxn(item)">
        <i class="ki-outline ki-check-circle fs-4 me-1"></i>
        {{ 'common.submit' | translate }}
      </button>
      }
      @if (item.isActive) {
      <button class="btn btn-sm btn-light-warning" (click)="toggleActive(item)">
        <i class="ki-outline ki-minus-circle fs-4 me-1"></i>
        {{ 'common.deactivate' | translate }}
      </button>
      } @else {
      <button class="btn btn-sm btn-light-success" (click)="toggleActive(item)">
        <i class="ki-outline ki-check-circle fs-4 me-1"></i>
        {{ 'common.activate' | translate }}
      </button>
      }
      <button class="btn btn-icon btn-sm btn-light-danger" (click)="delete(item.id)"
        [title]="'common.delete' | translate">
        <i class="ki-outline ki-trash fs-4"></i>
      </button>
    </div>
  </ng-template>
</app-custom-table-with-pagination>
