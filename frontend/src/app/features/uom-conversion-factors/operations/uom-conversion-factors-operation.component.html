<app-regular-operation-header
  [title]="(isEdit() ? 'uom_conversion_factors.edit_title' : 'uom_conversion_factors.add_title') | translate"
  icon="ki-outline ki-arrows-circle"
  color="success" />

<!-- Form card -->
<div class="card">
  <div class="card-body">

    <!-- Row 1: Conversion Group · Internal Code -->
    <div class="row g-4 mb-4">
      <div class="col-4">
        <label class="form-label required">{{ 'uom_conversion_factors.conversion_group' | translate }}</label>
        <app-custom-select-input
          [options]="groupOptions"
          [value]="form.uomConversionGroupId ?? null"
          (valueChange)="form.uomConversionGroupId = $event !== null ? +$event : null"
          [placeholder]="'common.select' | translate"
          [searchPlaceholder]="'common.search' | translate" />
      </div>
      <div class="col-4">
        <label class="form-label">{{ 'uom_conversion_factors.internal_code' | translate }}</label>
        <input class="form-control" type="text"
          [(ngModel)]="form.internalCode" name="internalCode"
          [placeholder]="'uom_conversion_factors.internal_code' | translate">
      </div>
    </div>

    <!-- Row 2: From UOM · To UOM · Factor -->
    <div class="row g-4">

      <div class="col-4">
        <label class="form-label required">{{ 'uom_conversion_factors.from_uom' | translate }}</label>
        <app-custom-select-input
          [options]="uomOptions"
          [value]="form.uomFromId || null"
          (valueChange)="form.uomFromId = +($event ?? 0)"
          [placeholder]="'common.select' | translate"
          [searchPlaceholder]="'common.search' | translate" />
      </div>

      <div class="col-4">
        <label class="form-label required">{{ 'uom_conversion_factors.to_uom' | translate }}</label>
        <app-custom-select-input
          [options]="uomOptions"
          [value]="form.uomToId || null"
          (valueChange)="form.uomToId = +($event ?? 0)"
          [placeholder]="'common.select' | translate"
          [searchPlaceholder]="'common.search' | translate" />
      </div>

      <div class="col-4">
        <label class="form-label required">{{ 'uom_conversion_factors.value' | translate }}</label>
        <input class="form-control" type="text" inputmode="decimal"
          [(ngModel)]="valueExpression" name="value"
          (blur)="evaluateExpression()"
          placeholder="e.g. 1/12">
        @if (form.value && form.value.toString() !== valueExpression) {
          <div class="text-muted fs-7 mt-1">= {{ form.value }}</div>
        }
      </div>

    </div>

  </div>

  <app-regular-operation-actions
    [saving]="saving()"
    [savingNew]="savingNew()"
    (save)="save()"
    (saveAndNew)="saveAndNew()"
    (reset)="resetForm()"
    (cancel)="back()" />
</div>
