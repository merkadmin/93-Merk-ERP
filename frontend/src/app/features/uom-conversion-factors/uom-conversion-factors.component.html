<app-regular-list-header-with-actions [title]="'nav.uom_conversion_factors' | translate"
  icon="ki-outline ki-arrows-circle" color="primary" [selectedCount]="selectedIds().size" [showImportExport]="true"
  (add)="addNew()" (refresh)="load()" (deleteSelected)="deleteSelected()" (exportTemplate)="exportTemplate()"
  (importFile)="importExcel($event)" />

<app-regular-list-search-actions [fields]="searchFields" (filterChange)="onFilterChange($event)" />

<app-custom-table-with-pagination entity="uomconversionfactors" [rows]="filteredFactors" [cellRenderers]="cellRenderers"
  (metadataLoaded)="columnMeta.set($event)" (selectionChange)="selectedIds.set($event)" [reload]="metaReloadKey()">
  <ng-template #rowActions let-f>
    <div class="d-inline-flex align-items-center gap-2">
      <button class="btn btn-icon btn-sm" (click)="toggleFavorite(f)" [class.btn-danger]="f.isFavorite"
        [class.btn-light]="!f.isFavorite" [title]="'common.favorite' | translate">
        @if (f.isFavorite) {
        <i class="ki-solid ki-heart fs-4"></i>
        } @else {
        <i class="ki-outline ki-heart fs-4"></i>
        }
      </button>
      <button class="btn btn-icon btn-sm btn-light-primary" (click)="edit(f.id)" [title]="'common.edit' | translate">
        <i class="ki-outline ki-pencil fs-4"></i>
      </button>
      @if (f.isActive) {
      <button class="btn btn-sm btn-light-warning" (click)="toggleActive(f)">
        <i class="ki-outline ki-minus-circle fs-4 me-1"></i>
        {{ 'common.deactivate' | translate }}
      </button>
      } @else {
      <button class="btn btn-sm btn-light-success" (click)="toggleActive(f)">
        <i class="ki-outline ki-check-circle fs-4 me-1"></i>
        {{ 'common.activate' | translate }}
      </button>
      }
      <button class="btn btn-icon btn-sm btn-light-danger" (click)="delete(f.id)" [title]="'common.delete' | translate">
        <i class="ki-outline ki-trash fs-4"></i>
      </button>
    </div>
  </ng-template>
</app-custom-table-with-pagination>
