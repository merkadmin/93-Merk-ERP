<app-regular-operation-header
  [title]="(isEdit() ? 'uom_conversion_groups.edit_title' : 'uom_conversion_groups.add_title') | translate"
  icon="ki-outline ki-abstract-14"
  color="success" />

<!-- Form card -->
<div class="card">
  <div class="card-body">
    <div class="row g-4">

      <div class="col-4 col-internal-code">
        <label class="form-label required">{{ 'uom_conversion_groups.internal_code' | translate }}</label>
        <input class="form-control field-name" [(ngModel)]="form.internalCode" name="internalCode" [placeholder]="'uom_conversion_groups.internal_code' | translate">
      </div>

      <div class="col-4 col-name-ar">
        <label class="form-label required">{{ 'common.name' | translate }} (AR)</label>
        <input class="form-control field-name" [(ngModel)]="form.name_AR" name="name_AR" [placeholder]="'common.name' | translate">
      </div>

      <div class="col-4 col-name-en">
        <label class="form-label required">{{ 'common.name' | translate }} (EN)</label>
        <input class="form-control field-name" [(ngModel)]="form.name_EN" name="name_EN" [placeholder]="'common.name' | translate">
      </div>

    </div>
  </div>

  <app-regular-operation-actions
    [saving]="saving()"
    [savingNew]="savingNew()"
    (save)="save()"
    (saveAndNew)="saveAndNew()"
    (reset)="resetForm()"
    (cancel)="back()" />
</div>
