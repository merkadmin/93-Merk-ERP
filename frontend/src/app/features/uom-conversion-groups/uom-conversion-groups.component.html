<!-- Page title -->
<div class="d-flex align-items-center bg-light-primary border border-dashed border-primary rounded py-4 px-6 mb-8">
  <i class="ki-outline ki-abstract-14 fs-2tx text-primary me-4"></i>
  <div class="d-flex flex-column flex-grow-1">
    <h2 class="fw-bold text-gray-900 fs-3 mb-0">{{ 'nav.uom_conversion_groups' | translate }}</h2>
  </div>
  <button class="btn btn-primary btn-sm" (click)="addNew()">
    <i class="ki-outline ki-plus fs-4 me-1"></i>
    {{ 'common.add' | translate }}
  </button>
</div>

<!-- Table -->
<div class="card">
  <div class="card-body p-0">
    <table class="table table-row-dashed table-row-gray-300 align-middle gs-4 gy-3 mb-0">
      <thead>
        <tr class="fw-bold text-muted bg-light">
          <th>{{ 'common.name' | translate }} (EN)</th>
          <th>{{ 'common.name' | translate }} (AR)</th>
          <th class="text-end">{{ 'common.actions' | translate }}</th>
        </tr>
      </thead>
      <tbody>
        @for (g of groups(); track g.id) {
          <tr>
            <td>{{ g.name_EN }}</td>
            <td>{{ g.name_AR }}</td>
            <td class="text-end">
              <button class="btn btn-icon btn-sm btn-light-primary me-1" (click)="edit(g.id)">
                <i class="ki-outline ki-pencil fs-4"></i>
              </button>
              <button class="btn btn-icon btn-sm btn-light-danger" (click)="delete(g.id)">
                <i class="ki-outline ki-trash fs-4"></i>
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="text-center text-muted py-6">—</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
