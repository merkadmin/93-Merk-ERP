<app-loading-spinner />

@if (serverStatus.isOffline()) {
  <div class="server-offline-overlay">
    <div class="server-offline-card">
      <i class="ki-outline ki-wifi-home fs-5x text-danger mb-6"></i>
      <h2 class="fw-bold text-gray-800 mb-3">{{ 'common.server_offline_title' | translate }}</h2>
      <p class="text-muted fs-5 mb-8">{{ 'common.server_offline_message' | translate }}</p>
      <button class="btn btn-primary px-8" (click)="retry()">
        <i class="ki-outline ki-arrows-circle fs-4 me-2"></i>
        {{ 'common.retry' | translate }}
      </button>
    </div>
  </div>
}
<div class="d-flex flex-column flex-root app-root" id="kt_app_root">
  <div class="app-page flex-column flex-column-fluid" id="kt_app_page">

    <!-- ── Quick-access bar template (shared by header + toolbar) ──────────── -->
    <ng-template #qaBar>
      <div class="quick-access-bar" (click)="$event.stopPropagation()">

        <!-- Theme toggle -->
        <button class="qa-btn" (click)="themeService.toggle()">
          <i class="ki-outline fs-5"
             [ngClass]="themeService.isDark() ? 'ki-night-day' : 'ki-moon'"></i>
        </button>

        <!-- Language toggle -->
        <button class="qa-btn lang-btn" (click)="langService.toggle()">
          <span class="fw-bold fs-7">{{ langService.lang() === 'ar' ? 'English' : 'عربي' }}</span>
        </button>

      </div>
    </ng-template>

    <!-- Mobile header (visible only on small screens, fixed at top) -->
    <div id="kt_app_header" class="app-header d-flex d-lg-none align-items-center">
      <div class="container-fluid d-flex align-items-center gap-2 px-3">
        <button class="btn btn-icon btn-sm btn-light flex-shrink-0" (click)="openSidebar()">
          <i class="ki-outline ki-burger-menu-2 fs-2"></i>
        </button>
        <a routerLink="/" class="d-flex align-items-center gap-2 flex-grow-1 text-decoration-none min-w-0">
          <i class="ki-outline ki-abstract-26 fs-2 text-primary flex-shrink-0"></i>
          <span class="fw-bold fs-6 text-body text-truncate">{{ 'app.title' | translate }}</span>
        </a>
        <ng-container *ngTemplateOutlet="qaBar"></ng-container>
      </div>
    </div>

    <!-- Page wrapper -->
    <div class="app-wrapper flex-column flex-row-fluid" id="kt_app_wrapper">

      <app-sidebar></app-sidebar>

      <div class="app-main flex-column flex-row-fluid" id="kt_app_main">

        <!-- Toolbar (desktop only) -->
        <div id="kt_app_toolbar"
             class="app-toolbar d-none d-lg-flex align-items-center justify-content-between px-4 h-60px border-bottom border-bottom-dashed">
          <h5 class="mb-0 fw-bold text-gray-700">{{ 'app.title' | translate }}</h5>
          <ng-container *ngTemplateOutlet="qaBar"></ng-container>
        </div>

        <!-- Page content -->
        <div class="app-content flex-column-fluid" id="kt_app_content">
          <div class="app-container container-fluid py-6" id="kt_app_content_container">
            <router-outlet></router-outlet>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
