<div class="card mb-6">
  <div class="card-body py-5 px-6">
    <div class="d-flex align-items-end gap-4 flex-wrap">

      <div class="d-flex align-items-center text-muted" style="padding-bottom: 6px">
        <i class="ki-outline ki-magnifier fs-2"></i>
      </div>

      @for (field of fields(); track field.key) {
        <div class="search-field">
          <label class="form-label fw-semibold fs-7 mb-1 text-gray-600">{{ field.label }}</label>

          @if (field.type === 'select') {
            <select class="form-select form-select-sm"
              [ngModel]="values[field.key] ?? null"
              (ngModelChange)="onValueChange(field.key, $event)">
              <option [ngValue]="null">{{ 'common.all' | translate }}</option>
              @for (opt of field.options ?? []; track opt.value) {
                <option [ngValue]="opt.value">{{ opt.label }}</option>
              }
            </select>
          } @else if (field.type === 'number') {
            <input class="form-control form-control-sm" type="number"
              [ngModel]="values[field.key] ?? null"
              (ngModelChange)="onValueChange(field.key, $event)"
              [placeholder]="field.placeholder ?? ''">
          } @else {
            <input class="form-control form-control-sm" type="text"
              [ngModel]="values[field.key] ?? ''"
              (ngModelChange)="onValueChange(field.key, $event)"
              [placeholder]="field.placeholder ?? ''">
          }
        </div>
      }

      <div style="padding-bottom: 2px">
        <button class="btn btn-light btn-sm" (click)="clear()">
          <i class="ki-outline ki-filter-search fs-4 me-1"></i>
          {{ 'common.clear_filter' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
