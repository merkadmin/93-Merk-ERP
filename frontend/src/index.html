<!doctype html>
<html lang="en" dir="ltr" data-bs-theme="light">

<head>
  <meta charset="utf-8">
  <title>Merk ERP</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Metronic CSS -->
  <link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
  <link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />

  <script>
    (function () {
      // ── Language / direction ──────────────────────────────────────
      var lang = localStorage.getItem('app-lang') || 'en';
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

      // ── Theme mode ────────────────────────────────────────────────
      var theme = localStorage.getItem('data-bs-theme') || 'light';
      if (theme === 'system') {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>

<body id="kt_app_body" data-kt-app-header-fixed-mobile="true" data-kt-app-sidebar-enabled="true"
  data-kt-app-sidebar-fixed="true" data-kt-app-toolbar-enabled="true" class="app-default">

  <app-root></app-root>

  <!-- Metronic JS (plugins first — jQuery/Bootstrap, then Metronic theme) -->
  <script src="assets/plugins/global/plugins.bundle.js"></script>
  <script src="assets/js/scripts.bundle.js"></script>
</body>

</html>
